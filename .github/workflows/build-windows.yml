name: Build Windows

# Build the Windows distributable in the cloud: the windows runner has MSVC + Python,
# so the native `drivelist` compiles normally (which is impossible on macOS).
# Triggered manually (workflow_dispatch) or on pushing a v* tag.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Pinned to windows-2022 (Visual Studio 2022 = v17). The windows-latest image moved to
    # Visual Studio 18, which the bundled node-gyp (@electron/node-gyp 10.2) cannot recognize
    # ("unsupported version: 18"), so the native drivelist build fails there.
    runs-on: windows-2022
    # Needed so electron-builder can create/upload the GitHub Release with the default token.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Node 22.12+ is required by electron@43 and @electron/rebuild@4 (their `engines`).
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # npm ci runs postinstall (electron-builder install-app-deps) — the runner
      # has the toolchain, so drivelist will build for the right ABI.
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Compile TypeScript + assets
        run: npm run build

      # electron-builder 26.x publishes the nsis and portable targets in parallel, and its publisher
      # cache is filled only after an `await` (PublishManager.getOrCreatePublisher became async) — so
      # both targets build their own GitHub publisher and each drafts its own release, splitting the
      # assets across two drafts. Its "reuse an existing release" check does match a draft by tag name,
      # but a draft carries no real git tag, so nothing is found while both are racing to create it.
      # Drafting the release up front removes the race: both targets find this one and upload into it.
      - name: Ensure draft release exists
        shell: bash
        run: |
          tag="v$(node -p "require('./package.json').version")"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing it."
          else
            gh release create "$tag" --draft --target "$GITHUB_SHA" --title "$tag" --notes "$tag"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --publish always: build the artifacts AND upload them (+ latest.yml for auto-update) to the
      # GitHub Release tagged v{version} drafted above (publish it manually to go live).
      # GH_TOKEN = the default workflow token, scoped to this repo by the `permissions` block above.
      - name: Package (nsis + portable) and publish
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: playhook-windows
          path: |
            release/*.exe
          if-no-files-found: error
          retention-days: 14
