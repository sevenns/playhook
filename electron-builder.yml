appId: com.personal.playhook
productName: Playhook
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

# Linux only: wraps the packed executable in a launcher that injects --no-sandbox inside a gamescope
# (Game Mode) session — the flag must be on the real argv, which neither app.commandLine.appendSwitch nor
# AppRun's own user-namespace probe can deliver there. No-op for the Windows targets. See the script.
afterPack: scripts/after-pack.mjs

# Only the compiled JS, assets, and dependency manifests are included in the build.
files:
  - dist/**/*
  - package.json

# drivelist is a native module. electron-builder usually detects native code and
# unpacks it from asar on its own, but we pin an explicit unpack so the .node binary is
# available in the packaged build (verify on a real nsis/portable build — step 0/11 of the plan).
asar: true
asarUnpack:
  - "**/node_modules/drivelist/**"
  - "**/node_modules/koffi/**"

win:
  icon: icon.ico
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# Linux / SteamOS build (Steam Deck port). AppImage is the only target — self-contained, runnable from
# any distro, and electron-updater supports AppImage in-place updates (blockmap deltas). `icon.png` is the
# 256×256 app icon (electron-builder may warn about size but it works). `category: Game` sets the .desktop
# category. The native drivelist/koffi unpack above applies to Linux too (koffi is unused there but stays
# a dependency of the win32 build). The umu-launcher zipapp is bundled via extraResources (added in Э4).
linux:
  icon: icon.png
  category: Game
  # Drop the version from the file name (the default is ${productName}-${version}.${ext}). The Steam
  # shortcut's appid is a hash of the launcher PATH, so a version in it changes the appid — resetting the
  # tile's artwork and playtime — whenever the user re-downloads by hand. The stable symlink in
  # ~/.local/share/playhook is what actually guarantees the appid survives (steam-shortcut.ts); this just
  # spares the user a versioned file to begin with.
  artifactName: ${productName}.${ext}
  target:
    - AppImage
  # Bundle the umu-launcher zipapp OUTSIDE asar (it is run as `python3 umu-run …` — Р1). Fetched into
  # resources/umu by `npm run build:umu` (scripts/fetch-umu.mjs) before the Linux pack. Lands at
  # <resourcesPath>/umu/umu-run in the AppImage.
  extraResources:
    - from: resources/umu
      to: umu

# Auto-update channel (electron-updater): the app reads `latest.yml` + the installer from this repo's
# GitHub Releases. Public repo → no token on the client. Update `owner`/`repo` if the GitHub repo is
# renamed. Only the `nsis` target self-updates; the `portable` exe does not.
publish:
  provider: github
  owner: sevenns
  repo: playhook
