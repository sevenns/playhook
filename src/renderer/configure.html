<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP mirrors settings.html. The bundle (configure.js, incl. CodeMirror) is same-origin (file://)
         → script-src 'self' is enough; CodeMirror 6 uses no eval/new Function, so no 'unsafe-eval'.
         style-src 'unsafe-inline' is required for CodeMirror's dynamically-injected theme stylesheets
         (and Fluent's inline styles) — the settings pattern already allows it, so no policy is loosened. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; media-src data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playhook — Configure game</title>
    <link rel="stylesheet" href="./configure.css" />
  </head>
  <body>
    <!-- Custom title bar (native hidden), matching the settings window: [icon] Playhook · Configure game.
         Draggable strip; the native min/max/close buttons sit on the right via the Window Controls
         Overlay, so the right ~140px is left clear. -->
    <header id="titlebar">
      <img id="titlebar-icon" alt="" />
      <span id="titlebar-title">Playhook</span>
      <span id="titlebar-subtitle"></span>
    </header>

    <main id="configure">
      <!-- Drive picker -->
      <section class="section">
        <span class="section-label" data-i18n="configure.card">Card</span>
        <fluent-dropdown id="drive-group" name="drive">
          <fluent-listbox id="drive-listbox"></fluent-listbox>
        </fluent-dropdown>
        <span id="drive-empty" data-i18n="configure.insertCard" hidden>Insert an SD card or flash drive.</span>
      </section>

      <!-- Game picker (a card can carry several games): mirrors the Card row, sits between it and the
           section tabs. The dropdown lists "index / count · title"; Add/Remove edit the games array. The
           section tabs + form below all apply to the selected game. Hidden until a card with ≥1 game is
           loaded (its options are built in configure.ts). -->
      <section class="section" id="game-section" hidden>
        <span class="section-label" data-i18n="configure.game">Game</span>
        <fluent-dropdown id="game-group" name="game">
          <fluent-listbox id="game-listbox"></fluent-listbox>
        </fluent-dropdown>
        <div class="button-row">
          <fluent-button id="game-add" data-i18n="configure.addGame">Add game</fluent-button>
          <fluent-button id="game-remove" data-i18n="configure.removeGame">Remove current</fluent-button>
        </div>
      </section>

      <!-- Edit tabs: one row of the form sections + a trailing JSON tab (built in configure.ts, since the
           section labels come from the translator). -->
      <div id="edit-tabs"></div>

      <!-- Starter templates — the first tab's panel (shown when the Templates tab is active). -->
      <section id="templates-panel" class="form-section" hidden>
        <span class="section-label" data-i18n="configure.startTemplate">Start from a template</span>
        <div class="button-row">
          <fluent-button id="tpl-executable" data-i18n="configure.tplExecutable">Executable file</fluent-button>
          <fluent-button id="tpl-installer" data-i18n="configure.tplInstaller">Installer</fluent-button>
          <!-- "Steam" is a brand name — not translated. -->
          <fluent-button id="tpl-steam">Steam</fluent-button>
        </div>
      </section>

      <!-- Interactive form (its inner DOM is built at runtime in configure-form-view.ts). -->
      <div id="form-view" hidden></div>

      <!-- Raw JSON editor (advanced). "game.json" is a filename — not translated. -->
      <section id="editor-section" hidden>
        <span class="section-label">game.json</span>
        <div id="editor"></div>
      </section>

      <!-- Validation results, shared by both modes (unmapped issues + the id-change warning). -->
      <div id="issues"></div>

      <!-- Actions. Reset re-reads game.json from the card (discarding edits); Format also lives in the
           JSON editor's right-click context menu (see configure-window.ts). -->
      <div class="actions">
        <fluent-button id="save" appearance="primary" data-i18n="configure.save">Save &amp; Apply</fluent-button>
        <fluent-button id="reset" data-i18n="configure.reset">Reset</fluent-button>
        <span id="status"></span>
      </div>
    </main>

    <!-- Confirm modal (custom; used for template-replace and dirty-switch confirmations). -->
    <div id="confirm-veil" hidden>
      <div id="confirm-panel">
        <span id="confirm-message"></span>
        <!-- Every confirm is a yes/no question: No cancels, Yes performs the action. Labels are fixed
             (common.yes / common.no) — never a context-specific verb. Order follows the Windows
             convention: the affirmative (Yes, primary) first, then No. -->
        <div class="button-row">
          <fluent-button id="confirm-ok" appearance="primary" data-i18n="common.yes">Yes</fluent-button>
          <fluent-button id="confirm-cancel" data-i18n="common.no">No</fluent-button>
        </div>
      </div>
    </div>

    <script type="module" src="./configure.js"></script>
  </body>
</html>
