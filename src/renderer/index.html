<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; media-src data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playhook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" data-phase="idle">
      <!-- Hero background: two stacked layers behind all UI (z-index only on the container, see
           styles.css). JS writes the image + pan into the idle layer and cross-fades it in, GTA-5-style,
           rotating through multiple hero images (and the idle wallpaper) — see app.ts. -->
      <div id="hero">
        <div class="hero-layer"></div>
        <div class="hero-layer"></div>
      </div>

      <!-- Bottom bar (same layout for every screen): play / title / status + the More button on the
           right. The empty (no-card) screen shows no Play; More there opens System + Close only. -->
      <footer id="bottom-bar">
        <div class="bar-content">
          <!-- Play is a rounded square now; aria is STATIC ("Play") — the install action moved into the
               Details menu, so this button never relabels. It shows one of three visuals per state
               (see styles.css, driven by #app[data-busy]): the play triangle (idle/ready), the loader
               arc (game phases: launch/sync/run), or a spinning gear (system activity: install/steam). -->
          <button id="play-button" class="play-button" type="button" aria-label="Play" data-i18n-aria-label="launcher.aria.play">
            <!-- Play triangle with rounded corners (quadratic beziers through each vertex, ~6-unit
                 edge offset) so it matches the 10px-radius language of the rest of the UI. -->
            <svg class="icon-play" viewBox="0 0 36 48" aria-hidden="true">
              <path d="M6.94 5.4 L29.06 20.6 Q34 24 29.06 27.4 L6.94 42.6 Q2 46 2 40 L2 8 Q2 2 6.94 5.4 Z" />
            </svg>
            <!-- Gear: shown (transparent button, d2 gear, slow spin) during system activity —
                 installing / uninstalling / a Steam download or removal. -->
            <svg class="icon-gear" viewBox="0 0 48 48" aria-hidden="true">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M28.7031 6.19052C30.2696 6.66089 31.766 7.33913 33.1523 8.20713L35.5469 5.79971C36.1032 5.24603 36.8559 4.93522 37.6406 4.93522C38.4253 4.93522 39.1781 5.24603 39.7344 5.79971L42.1875 8.26575C42.7409 8.82232 43.0516 9.57546 43.0516 10.3605C43.0516 11.1456 42.7409 11.8987 42.1875 12.4553L39.6094 15.0347C40.3525 16.3812 40.9221 17.8165 41.3047 19.3063H45.0234C45.414 19.3053 45.8008 19.3813 46.1619 19.5301C46.523 19.679 46.8512 19.8976 47.1277 20.1735C47.4042 20.4494 47.6236 20.7772 47.7733 21.138C47.923 21.4989 48 21.8858 48 22.2765V25.7548C47.9979 26.5398 47.6853 27.2921 47.1305 27.8472C46.5756 28.4023 45.8237 28.7151 45.0391 28.7171H41.2852C40.8943 30.191 40.3208 31.6103 39.5781 32.9419L42.1875 35.5642C42.7409 36.1208 43.0516 36.8739 43.0516 37.659C43.0516 38.4441 42.7409 39.1972 42.1875 39.7538L39.7383 42.2081C39.1813 42.762 38.4279 43.0729 37.6426 43.0729C36.8573 43.0729 36.1038 42.762 35.5469 42.2081L33.0703 39.7264C31.7043 40.565 30.2349 41.2219 28.6992 41.6805V45.0376C28.6972 45.8227 28.3845 46.575 27.8297 47.1301C27.2749 47.6852 26.5229 47.9979 25.7383 48H22.2656C21.481 47.9979 20.729 47.6852 20.1742 47.1301C19.6194 46.575 19.3067 45.8227 19.3047 45.0376V42.0049C17.6192 41.6235 15.9953 41.0078 14.4805 40.1759L12.4492 42.2081C11.8919 42.7599 11.1395 43.0694 10.3555 43.0694C9.57141 43.0694 8.81901 42.7599 8.26172 42.2081L5.79688 39.7421C5.24441 39.185 4.93441 38.432 4.93441 37.6473C4.93441 36.8625 5.24441 36.1096 5.79688 35.5525L7.64062 33.7079C6.67489 32.1604 5.94303 30.4787 5.46875 28.7171H2.96094C2.17628 28.7151 1.42435 28.4023 0.869516 27.8472C0.314679 27.2921 0.00206218 26.5398 0 25.7548L0 22.2765C-2.72163e-06 21.4901 0.311703 20.7358 0.866763 20.179C1.42182 19.6222 2.17493 19.3084 2.96094 19.3063H5.44141C5.90239 17.5225 6.62789 15.8179 7.59375 14.2491L5.79688 12.4553C5.24536 11.8977 4.936 11.145 4.936 10.3605C4.936 9.57609 5.24536 8.82332 5.79688 8.26575L8.26172 5.79971C8.81802 5.24603 9.57079 4.93522 10.3555 4.93522C11.1402 4.93522 11.8929 5.24603 12.4492 5.79971L14.4023 7.75379C15.934 6.89009 17.5826 6.25296 19.2969 5.86224V2.96238C19.2989 2.17599 19.6126 1.42252 20.1692 0.867186C20.7257 0.311855 21.4796 -2.72296e-06 22.2656 0L25.7422 0C26.5268 0.00206319 27.2788 0.314833 27.8336 0.869941C28.3884 1.42505 28.7011 2.17735 28.7031 2.96238V6.19052ZM23.3828 14.3351C25.2835 14.3351 27.1416 14.8991 28.7219 15.9557C30.3022 17.0122 31.5339 18.514 32.2611 20.271C32.9883 22.0279 33.1784 23.9612 32.8073 25.8262C32.4362 27.6913 31.5206 29.4044 30.1763 30.7487C28.832 32.0931 27.1194 33.0085 25.2551 33.379C23.3908 33.7495 21.4586 33.5586 19.7028 32.8303C17.9469 32.102 16.4464 30.8692 15.391 29.2876C14.3356 27.7061 13.7727 25.8469 13.7734 23.9453C13.7734 22.6829 14.022 21.4329 14.505 20.2667C14.9879 19.1005 15.6958 18.0409 16.5882 17.1485C17.4806 16.2561 18.5399 15.5483 19.7058 15.0655C20.8716 14.5828 22.1211 14.3346 23.3828 14.3351Z"
              />
            </svg>
            <span class="loader" aria-hidden="true"></span>
          </button>

          <div id="status" class="status"></div>
          <div id="title" class="title"></div>

          <!-- More button: same rect-button component (invert-on-hover), three dots. Opens the Details
               menu popup. Hidden on the empty screen; fades out while busy (like the old Info button). -->
          <button id="more-button" class="rect-button" type="button" aria-label="More" data-i18n-aria-label="launcher.aria.more">
            <svg class="icon-more" viewBox="0 0 56 16" aria-hidden="true">
              <path d="M8 0C12.4183 0 16 3.58172 16 8C16 12.4183 12.4183 16 8 16C3.58172 16 0 12.4183 0 8C0 3.58172 3.58172 0 8 0Z" />
              <path d="M28 0C32.4183 0 36 3.58172 36 8C36 12.4183 32.4183 16 28 16C23.5817 16 20 12.4183 20 8C20 3.58172 23.5817 0 28 0Z" />
              <path d="M48 0C52.4183 0 56 3.58172 56 8C56 12.4183 52.4183 16 48 16C43.5817 16 40 12.4183 40 8C40 3.58172 43.5817 0 48 0Z" />
            </svg>
          </button>

        </div>
      </footer>

      <!-- Unified popup: ONE frosted veil + ONE right-side column (450px), whose content and action stack
           switch by data-view (details / power / confirm / error) — a mirror of the popup state machine in
           controls.ts. A single veil (vs one per section) avoids the cross-fade flicker of two identical
           blur veils when moving Details ↔ Power: the veil stays, only the content changes.
           Default focus in every stack is the BOTTOM button (Close / No) — see controls.ts. -->
      <section id="popup" class="popup" aria-hidden="true" data-view="details">
        <div class="popup-veil"></div>
        <div class="popup-column">
          <!-- Top content — only the block for the active view shows (CSS). -->
          <div class="popup-content">
            <!-- details: game stats (built from JS, same #info-panel id/styles as before). -->
            <div class="popup-info" id="info-panel"></div>
            <!-- confirm: question + (install-only) destination path note. data-mode/data-install-via on
                 #popup drive the note's visibility, exactly as the old confirm popup did. -->
            <div class="popup-confirm">
              <div class="popup-message" id="confirm-message"></div>
              <!-- Mixed markup: only the leading TEXT is localized via its own [data-i18n] span; the
                   <br/> and #confirm-path (filled from JS) stay untouched — no textContent on the parent. -->
              <div class="popup-detail" id="confirm-description">
                <span data-i18n="launcher.installPathNote"
                  >Since not all installers support silent mode, during installation you need to specify the following path:</span
                ><br /><span class="confirm-path" id="confirm-path"></span>
              </div>
            </div>
            <!-- error: title + detail (arbitrary error text from main). -->
            <div class="popup-error">
              <div class="popup-message" data-i18n="launcher.errorTitle">Something went wrong</div>
              <div class="popup-detail" id="error-message"></div>
            </div>
          </div>

          <!-- Bottom action stacks — one group per view; only the active view's group shows (CSS).
               Each group is a vertical stack (align-items: flex-end): a longer localized label grows
               to the LEFT, the right edge stays fixed. -->
          <div class="popup-actions">
            <div class="actions-group" data-group="details">
              <button id="menu-shutdown" class="text-button" type="button" data-i18n="launcher.menu.system">System</button>
              <!-- Install/Uninstall — one button; its text + visibility come from JS (executable games
                   have no install block, so the button is hidden entirely). -->
              <button id="menu-install-toggle" class="text-button" type="button"></button>
              <!-- Force-close the running game — its text + visibility come from JS (shown only while a
                   game is running), so no data-i18n (mirrors the install toggle, keeps the i18n HTML test happy). -->
              <button id="menu-kill" class="text-button" type="button"></button>
              <!-- Opens the "Select game" list — shown only for a multi-game card on the ready screen (JS
                   toggles visibility); no data-i18n so a language change relabels it at render time. -->
              <button id="menu-select-game" class="text-button" type="button"></button>
              <button id="menu-close" class="text-button" type="button" data-i18n="launcher.menu.close">Close</button>
            </div>
            <!-- Select-game list: the card's OTHER games (built from JS, each a .text-button carrying
                 data-game-id) inside a scrollable list, with a fixed Close below it (stays reachable when
                 the list scrolls). Picking a game closes the whole popup and switches. -->
            <div class="actions-group" data-group="select-game">
              <div id="select-game-list" class="select-game-list"></div>
              <button id="menu-select-close" class="text-button" type="button" data-i18n="launcher.menu.close">Close</button>
            </div>
            <div class="actions-group" data-group="power">
              <button id="power-shutdown" class="text-button" type="button" data-i18n="launcher.menu.shutdown">Shutdown</button>
              <button id="power-reboot" class="text-button" type="button" data-i18n="launcher.menu.reboot">Reboot</button>
              <button id="power-sleep" class="text-button" type="button" data-i18n="launcher.menu.sleep">Sleep</button>
              <button id="power-minimize" class="text-button" type="button" data-i18n="launcher.menu.minimize">Minimize Playhook</button>
              <button id="power-close" class="text-button" type="button" data-i18n="launcher.menu.close">Close</button>
            </div>
            <div class="actions-group" data-group="confirm">
              <button id="confirm-yes" class="text-button" type="button" data-i18n="common.yes">Yes</button>
              <button id="confirm-no" class="text-button" type="button" data-i18n="common.no">No</button>
            </div>
            <div class="actions-group" data-group="error">
              <button id="error-close" class="text-button" type="button" data-i18n="launcher.menu.close">Close</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
