<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>microSD Game Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" data-phase="idle">
      <!-- Centered message for idle / error states -->
      <div id="message" class="message"></div>

      <!-- Bottom bar: gradient of d1, holds play / title / status / info -->
      <footer id="bottom-bar">
        <div class="bar-content">
          <button id="play-button" class="circle-button" type="button" aria-label="Play">
            <svg class="icon-play" viewBox="0 0 36 48" aria-hidden="true">
              <path d="M2 2 L34 24 L2 46 Z" />
            </svg>
            <span class="loader" aria-hidden="true"></span>
          </button>

          <div id="status" class="status"></div>
          <div id="title" class="title"></div>

          <button id="info-button" class="rect-button" type="button" aria-label="Info">
            <!-- Filled ⓘ disc with the "i" cut OUT (fill-rule evenodd) so the button background
                 shows through the hole — which makes the hover color inversion automatic. -->
            <svg class="icon-info" viewBox="0 0 40 40" aria-hidden="true">
              <path
                fill-rule="evenodd"
                d="M0,20 a20,20 0 1,0 40,0 a20,20 0 1,0 -40,0 Z
                   M16.3,11.5 a3.7,3.7 0 1,0 7.4,0 a3.7,3.7 0 1,0 -7.4,0 Z
                   M16.5,18 a3.5,3.5 0 0,1 7,0 L23.5,30 a3.5,3.5 0 0,1 -7,0 L16.5,18 Z"
              />
            </svg>
          </button>
        </div>
      </footer>

      <!-- Info popup: full-screen veil (horizontal d1 gradient) + right-aligned info column -->
      <section id="info-popup" aria-hidden="true">
        <div class="info-veil"></div>
        <div class="info-panel" id="info-panel"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
